<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Форма выбора питомца</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<main>
    <h1>Найди себе друга!</h1>
    <form>
        <label>
            Выберите Ваше животное
            <select name="petType" id="petType">
                <option value="cat" selected>Кошка</option>
                <option value="dog">Собака</option>
                <option value="tiger">Тигр</option>
            </select>
        </label>

        <br>
        Укажите пол питомца
        <br>
        <label>
            <input type="radio" name="gender" value="boy"> Boy
        </label>
        <label>
            <input type="radio" name="gender" value="girl"> Girl
        </label>
        <label>
            <input type="radio" name="gender" value="none"> None
        </label>
        <br>

        <label>
            Укажите цвет глаз Вашего питомца
            <input type="color" name="eyeColor">
        </label>
        <br>

        <label>
            Укажите длину хвоста Вашего питомца
            <input type="number" name="tailLength" min="7" max="120">
        </label>
        <br>

        <label>
            Укажите имя Вашего питомца
            <input type="text" name="name" minlength="3" maxlength="50">
        </label>
        <br>

        <label>
            Укажите дату рождения Вашего питомца
            <input type="date" name="dateOfBirth">
        </label>
        <br>

        <label>
            Укажите Вашу электронную почту
            <input type="email" name="email">
        </label>
        <br>

        <label>
            Укажите Ваш номер телефона (опционально)
            <input type="tel" name="phone">
        </label>
        <br>

        <label>
            Я прочитал правила и согласен с правилами обработки данных
            <input type="checkbox" name="rules" value="true">
        </label>
        <br>

        <button type="submit" name="submit" value="Отправить" formmethod="post" formaction="/pets/orders">
            Отправить
        </button>
        <br>

        <button type="reset">
            Сбросить значения
        </button>
    </form>
</main>
</body>
</html>
